name: Publish to npmjs

on:
  # Manually trigger this workflow from the GitHub Actions tab
  workflow_dispatch:
    # You can add inputs here, e.g. to override version (advanced users can implement version bumping)
    # For now, bump the version in projects/a-lib/package.json, commit, and trigger.

jobs:
  publish:
    runs-on: ubuntu-latest
    # Required permissions for publishing to GitHub Packages using GITHUB_TOKEN
    permissions:
      contents: read
      packages: write
      # id-token: write  # Uncomment if you want npm provenance attestations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: |
          cd workspace
          npm ci

      - name: Build the library with ng-packagr
        run: |
          cd workspace
          npm run build:lib

      - name: Publish to npm
        run: |
          cd workspace
          # The built package in dist/a-lib has "publishConfig" pointing to GitHub registry
          # and a scoped name (@grok-project/a-lib). The GITHUB_TOKEN provides auth.
          npm publish ./dist/a-lib --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node with registry-url + NODE_AUTH_TOKEN writes the auth for https://npm.pkg.github.com/

# NOTE:
# - The package name in projects/a-lib/package.json MUST start with a scope that matches
#   the GitHub owner (user or organization) of the repository running this workflow.
#   Example: if your repo is https://github.com/yourname/a-lib then use "@yourname/a-lib"
# - If you want to publish to the public npm registry (npmjs.com) instead, remove or
#   override the "publishConfig" in projects/a-lib/package.json and use a PAT for npm.
# - After publishing, the package will be available at:
#   https://github.com/grok-project?tab=packages  (adjust owner)
# - To consume: npm install @grok-project/a-lib  (with .npmrc pointing to gh registry, or public if made public)
